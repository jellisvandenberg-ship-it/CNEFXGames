<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TETRIS - CNEFX Game Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: radial-gradient(circle at top, #1a1a2e, #0b0b0b);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* 🏠 HOME BUTTON */
  .home-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    background: #1c1c1c;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border: 1px solid #333;
    transition: 0.2s;
    z-index: 9999;
  }

  .home-btn:hover {
    background: #2a2a2a;
    transform: scale(1.05);
  }

  h1 {
    margin-top: 60px;
    margin-bottom: 5px;
    letter-spacing: 2px;
  }

  .subtitle {
    opacity: 0.7;
    font-size: 14px;
    margin-bottom: 20px;
  }

  /* 🎮 GAME WRAPPER */
  .game-container {
    background: linear-gradient(145deg, #141414, #0f0f0f);
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    border: 1px solid #222;
  }

  canvas {
    background: #000;
    border: 2px solid #333;
    box-shadow: 0 0 20px rgba(0,255,136,0.1);
  }

  .info {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.8;
    text-align: center;
  }

  .hint {
    margin-top: 5px;
    font-size: 12px;
    opacity: 0.5;
  }
</style>
</head>

<body>

<!-- 🏠 GLOBAL HOME -->
<a href="index.html" class="home-btn">CNEFX</a>

<h1>TETRIS</h1>
<div class="subtitle">Stack. Clear. Survive.</div>

<div class="game-container">
  <canvas id="tetris" width="240" height="400"></canvas>

  <div class="info">Arrow keys to move • ↑ rotate • ↓ drop</div>
  <div class="hint">Tip: Don’t panic when it gets fast 😏</div>
</div>

<script>
const canvas = document.getElementById("tetris");
const ctx = canvas.getContext("2d");
ctx.scale(20, 20);

function createMatrix(w, h) {
  const matrix = [];
  while (h--) matrix.push(new Array(w).fill(0));
  return matrix;
}

function createPiece(type) {
  if (type === "T") return [[0,0,0],[1,1,1],[0,1,0]];
  if (type === "O") return [[2,2],[2,2]];
  if (type === "L") return [[0,3,0],[0,3,0],[0,3,3]];
  if (type === "J") return [[0,4,0],[0,4,0],[4,4,0]];
  if (type === "I") return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
  if (type === "S") return [[0,6,6],[6,6,0],[0,0,0]];
  if (type === "Z") return [[7,7,0],[0,7,7],[0,0,0]];
}

function drawMatrix(matrix, offset) {
  matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        ctx.fillStyle = colors[value];
        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
      }
    });
  });
}

function merge(arena, player) {
  player.matrix.forEach((row, y) => {
    row.forEach((value, x) => {
      if (value !== 0) {
        arena[y + player.pos.y][x + player.pos.x] = value;
      }
    });
  });
}

function collide(arena, player) {
  const m = player.matrix;
  const o = player.pos;
  for (let y = 0; y < m.length; y++) {
    for (let x = 0; x < m[y].length; x++) {
      if (m[y][x] !== 0 &&
        (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
        return true;
      }
    }
  }
  return false;
}

function arenaSweep() {
  outer: for (let y = arena.length - 1; y >= 0; y--) {
    for (let x = 0; x < arena[y].length; x++) {
      if (arena[y][x] === 0) continue outer;
    }
    arena.splice(y, 1);
    arena.unshift(new Array(arena[0].length).fill(0));
  }
}

function rotate(matrix) {
  for (let y = 0; y < matrix.length; y++) {
    for (let x = 0; x < y; x++) {
      [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
  }
  matrix.forEach(row => row.reverse());
}

function playerReset() {
  const pieces = "TJLOSZI";
  player.matrix = createPiece(pieces[Math.floor(Math.random()*pieces.length)]);
  player.pos.y = 0;
  player.pos.x = Math.floor(arena[0].length / 2 - player.matrix[0].length / 2);

  if (collide(arena, player)) {
    arena.forEach(row => row.fill(0));
  }
}

function playerDrop() {
  player.pos.y++;
  if (collide(arena, player)) {
    player.pos.y--;
    merge(arena, player);
    arenaSweep();
    playerReset();
  }
  dropCounter = 0;
}

function playerMove(dir) {
  player.pos.x += dir;
  if (collide(arena, player)) player.pos.x -= dir;
}

function playerRotate() {
  rotate(player.matrix);
  if (collide(arena, player)) {
    rotate(player.matrix);
    rotate(player.matrix);
    rotate(player.matrix);
  }
}

let arena = createMatrix(12, 20);

let player = {
  pos: {x:0,y:0},
  matrix: null
};

const colors = [
  null,
  "#ff4d6d",
  "#4dd2ff",
  "#4dff88",
  "#c44dff",
  "#ff9f1c",
  "#ffe14d",
  "#4d79ff"
];

let dropCounter = 0;
let dropInterval = 500;
let lastTime = 0;

function update(time = 0) {
  const delta = time - lastTime;
  lastTime = time;
  dropCounter += delta;

  if (dropCounter > dropInterval) playerDrop();

  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawMatrix(arena, {x:0,y:0});
  drawMatrix(player.matrix, player.pos);
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") playerMove(-1);
  else if (e.key === "ArrowRight") playerMove(1);
  else if (e.key === "ArrowDown") playerDrop();
  else if (e.key === "ArrowUp") playerRotate();
});

playerReset();
update();
</script>

</body>
</html>
