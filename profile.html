<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
</head>
<body>

<h1>My Account</h1>

<p id="userInfo"></p>

<script>
firebase.auth().onAuthStateChanged((user) => {
  if (user) {
    document.getElementById("userInfo").innerHTML = `
      <b>Email:</b> ${user.email}<br>
      <b>Name:</b> ${user.displayName || "No name set"}
    `;
  } else {
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
