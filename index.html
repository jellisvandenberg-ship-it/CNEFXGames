<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNEFX Game Hub</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: radial-gradient(circle at top, #1b1f3a, #0a0a0f 60%);
    overflow-x: hidden;
  }

  /* subtle grid background overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    opacity: 0.4;
  }

  /* 🏠 TOP LEFT BUTTON */
  .home-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    padding: 10px 14px;
    background: rgba(30,30,30,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    backdrop-filter: blur(8px);
    transition: 0.2s;
    z-index: 999;
  }

  .home-btn:hover {
    transform: scale(1.05);
    background: rgba(50,50,50,0.9);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 80px 20px 30px;
  }

  header h1 {
    font-size: 40px;
    margin: 0;
    letter-spacing: 2px;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.7;
  }

  .online {
    color: #00ff88;
    font-weight: bold;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 18px;
    padding: 30px;
    max-width: 900px;
    margin: auto;
  }

  /* CARD */
  .card {
    background: rgba(25,25,25,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
    transition: 0.25s;
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .card:hover {
    transform: translateY(-6px) scale(1.03);
    border-color: rgba(0,255,136,0.3);
    box-shadow: 0 12px 40px rgba(0,255,136,0.08);
  }

  h3 {
    margin: 10px 0 5px;
  }

  p {
    font-size: 13px;
    opacity: 0.7;
  }

  button {
    margin-top: 10px;
    padding: 7px 14px;
    border: none;
    border-radius: 8px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #00cc6a;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    opacity: 0.4;
  }
</style>
</head>

<body>

<!-- 🏠 HOME BUTTON -->
<a href="index.html" class="home-btn">CNEFX</a>

<!-- HEADER -->
<header>
  <h1>CNEFX Game Hub</h1>
  <div class="status">Status: <span class="online">Online</span></div>
  <div style="opacity:0.6;font-size:12px;margin-top:6px;">
    A lightweight arcade launcher
  </div>
</header>

<!-- GRID -->
<div class="grid" id="gameGrid"></div>

<footer>
  built by CNEFX 🚀
</footer>

<!-- GAME DATA -->
<script src="games.js"></script>

<!-- AUTO BUILD -->
<script>
const grid = document.getElementById("gameGrid");

games.forEach(game => {
  grid.innerHTML += `
    <a href="${game.file}">
      <div class="card">
        <h3>${game.name}</h3>
        <p>${game.desc}</p>
        <button>Play</button>
      </div>
    </a>
  `;
});
</script>

</body>
</html>
