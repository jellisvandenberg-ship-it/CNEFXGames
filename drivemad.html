<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drive Mad</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
  }

  header {
    padding: 12px 16px;
    background: #1a1a1a;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header h1 {
    margin: 0;
    font-size: 18px;
  }

  .btn {
    background: #ffcc00;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
    margin-left: 6px;
  }

  .container {
    height: calc(100vh - 50px);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  iframe {
    width: 95%;
    height: 90%;
    border: none;
    border-radius: 12px;
  }

  #fallback {
    display: none;
    text-align: center;
  }

  a {
    color: #ffcc00;
    font-weight: bold;
    text-decoration: none;
  }
</style>
</head>

<body>

<header>
  <h1>Drive Mad</h1>

  <div>
    <button class="btn" onclick="fullscreen()">Fullscreen</button>
    <button class="btn" onclick="openTab()">Open in Tab</button>
  </div>
</header>

<div class="container">

  <!-- Try embed version first -->
  <iframe 
    id="gameFrame"
    src="https://game.gys.cn/embed/drive-mad"
  ></iframe>

  <!-- fallback if iframe fails -->
  <div id="fallback">
    <h2>Game can’t load here 😢</h2>
    <p>
      Click below to play:
      <br><br>
      <a href="https://www.drivemad.com/" target="_blank">
        ▶ Play Drive Mad
      </a>
    </p>
  </div>

</div>

<script>
function fullscreen() {
  const iframe = document.getElementById("gameFrame");
  if (iframe.requestFullscreen) {
    iframe.requestFullscreen();
  }
}

function openTab() {
  window.open("https://www.drivemad.com/", "_blank");
}

// fallback detection (best effort)
setTimeout(() => {
  const iframe = document.getElementById("gameFrame");

  try {
    if (!iframe.contentWindow) throw new Error("blocked");

    setTimeout(() => {
      document.getElementById("fallback").style.display = "block";
      iframe.style.display = "none";
    }, 2500);

  } catch (e) {
    document.getElementById("fallback").style.display = "block";
    iframe.style.display = "none";
  }
}, 4000);
</script>

</body>
</html>
