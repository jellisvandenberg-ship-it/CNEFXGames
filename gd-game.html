<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CNEFX Game</title>

<style>
  body {
    margin: 0;
    background: black;
    font-family: Arial;
  }

  /* home button */
  .home {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: #00ff88;
    color: black;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
  }

  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }
</style>
</head>

<body>

<a class="home" href="index.html">CNEFX</a>

<iframe id="gameFrame"></iframe>

<script>
  // get game id from URL
  const params = new URLSearchParams(window.location.search);
  const gameUrl = params.get("url");

  if (gameUrl) {
    document.getElementById("gameFrame").src = gameUrl;
  } else {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50px;'>No game loaded</h2>";
  }
</script>

</body>
</html>
