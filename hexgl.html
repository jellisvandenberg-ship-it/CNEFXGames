<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HexGL - CNEFX</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at top, #1b1f3a, #0a0a0f 60%);
    font-family: Arial, sans-serif;
    overflow:hidden;
}

/* Home button */
.home-btn{
    position:fixed;
    top:15px;
    left:15px;
    padding:12px 18px;
    background:rgba(30,30,30,0.9);
    color:white;
    text-decoration:none;
    font-weight:bold;
    border-radius:12px;
    z-index:1000;
    transition:0.2s;
}

.home-btn:hover{
    background:rgba(60,60,60,0.9);
    transform:scale(1.05);
}

/* Title */
.title{
    position:fixed;
    top:15px;
    right:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
    z-index:1000;
}

/* Game */
iframe{
    width:100vw;
    height:100vh;
    border:none;
}
</style>
</head>

<body>

<a href="index.html" class="home-btn">CNEFX</a>

<div class="title">
    HEXGL
</div>

<iframe
    src="https://hexgl.bkcore.com/play/"
    allowfullscreen>
</iframe>

</body>
</html>
